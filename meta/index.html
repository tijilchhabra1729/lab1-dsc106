<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meta – About This Site</title>
    <link rel="stylesheet" href="/lab1-dsc106/style.css" />
    <script type="module" src="/lab1-dsc106/global.js"></script>
    <script type="module" src="main.js"></script>
  </head>
  <body>
    <h1>Meta</h1>
    <p>Stats and visualizations about the code that makes up this very website.</p>

    <div id="stats"></div>

    <h2>Commits by time of day</h2>
    <div id="chart"></div>

    <p id="selection-count"></p>
    <dl id="language-breakdown" class="stats"></dl>

    <dl id="commit-tooltip" class="info tooltip" hidden>
      <dt>Commit</dt>
      <dd><a href="" id="commit-link" target="_blank"></a></dd>
      <dt>Date</dt>
      <dd id="commit-date"></dd>
      <dt>Time</dt>
      <dd id="commit-time"></dd>
      <dt>Author</dt>
      <dd id="commit-author"></dd>
      <dt>Lines edited</dt>
      <dd id="commit-lines"></dd>
    </dl>
  </body>
</html>
